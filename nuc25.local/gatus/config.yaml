ui:
  title: RAG Stack Status
  header: RAG Stack Health
  buttons:
    - name: RAGFlow
      link: http://nuc25.local
    - name: Langfuse
      link: http://nuc25.local:3000
    - name: MinIO
      link: http://nuc25.local:9001
    - name: SearXNG
      link: http://nuc25.local:8088
    - name: Nextcloud
      link: https://cloud.taildec1bd.ts.net
    - name: Paperless
      link: https://cloud.taildec1bd.ts.net:8010
    - name: apple-on-device-openai
      link: http://${MACSTUDIO_IP}:11537
    - name: WUD
      link: http://nuc25.local:3002
    - name: ntfy
      link: http://nuc25.local:5555

alerting:
  ntfy:
    url: "http://ntfy:80"
    topic: "rag-stack"
    priority: 4
    default-alert:
      failure-threshold: 3
      success-threshold: 2
      send-on-resolved: true

endpoints:

  # ── nuc25: RAG Core ───────────────────────────────────────────────────────

  - name: RAGFlow
    group: "nuc25 — RAG Core"
    url: "http://ragflow:80/"
    description: "RAGFlow web UI | docker network: ragflow:80 | external: http://localhost:9380"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: Infinity (vector DB)
    group: "nuc25 — RAG Core"
    url: "http://infinity:23820/admin/node/current"
    description: "Infinity vector database | docker network: infinity:23820 | HTTP admin API"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: MySQL
    group: "nuc25 — RAG Core"
    url: "tcp://mysql:3306"
    description: "MySQL database | docker network: mysql:3306 | external: localhost:3306"
    interval: 30s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: ntfy

  - name: MinIO (RAGFlow)
    group: "nuc25 — RAG Core"
    url: "http://minio:9000/minio/health/live"
    description: "MinIO S3 storage | docker network: minio:9000 | external: localhost:9000 | console: localhost:9001"
    interval: 30s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: Redis (RAGFlow)
    group: "nuc25 — RAG Core"
    url: "tcp://redis:6379"
    description: "Redis cache/broker | docker network: redis:6379 | external: localhost:6379"
    interval: 30s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: ntfy

  # ── nuc25: Web Tools ──────────────────────────────────────────────────────

  - name: SearXNG
    group: "nuc25 — Web Tools"
    url: "http://searxng:8080/healthz"
    description: "SearXNG meta search engine | docker network: searxng:8080 | external: localhost:8888"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: Spider Local
    group: "nuc25 — Web Tools"
    url: "http://spider-local:8000/health"
    description: "Spider local web crawler | docker network: spider-local:8000 | internal only"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: RAG-MCP
    group: "nuc25 — Web Tools"
    url: "http://rag-mcp:8000/health"
    description: "RAG MCP server | docker network: rag-mcp:8000 | external: localhost:8765"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  # ── nuc25: Observability ──────────────────────────────────────────────────

  - name: Langfuse
    group: "nuc25 — Observability"
    url: "http://langfuse-web:3000/api/public/health"
    description: "Langfuse LLM observability | docker network: langfuse-web:3000 | external: localhost:3000"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == OK"
    alerts:
      - type: ntfy

  # ── nuc25: Apps ───────────────────────────────────────────────────────────

  - name: Nextcloud
    group: "nuc25 — Apps"
    # Routes via rag-ingress → aio Caddy (alias aio-ingress) → nextcloud-aio-apache:11000.
    # HTTP (not HTTPS) avoids Tailscale cert mismatch; Host header selects the right Caddy site.
    # 502 = apache down (AIO not started); 200 + JSON = healthy.
    url: "http://aio-ingress/status.php"
    headers:
      Host: "cloud.taildec1bd.ts.net"
    description: "Nextcloud server | rag-ingress→aio-caddy→apache:11000 | external: cloud.taildec1bd.ts.net (via Tailscale) | admin: https://localhost:8080"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].installed == true"
      - "[BODY].maintenance == false"
    alerts:
      - type: ntfy

  - name: Paperless-ngx
    group: "nuc25 — Apps"
    # Routes via rag-ingress; paperless-webserver is on rag-ingress (left nextcloud-aio).
    # Root URL redirects to /accounts/login/ with 302 — use < 400 to accept the redirect.
    url: "http://paperless-webserver:8000/"
    description: "Paperless document management | rag-ingress: paperless-webserver:8000 | external: cloud.taildec1bd.ts.net:8010 (via Tailscale)"
    interval: 60s
    conditions:
      - "[STATUS] < 400"
    alerts:
      - type: ntfy

  # ── macstudio: ML Services ────────────────────────────────────────────────

  - name: apple-on-device-openai
    group: "macstudio — ML Services"
    url: "http://${MACSTUDIO_IP}:11537/v1/models"
    description: "Apple Intelligence (FoundationModels) OpenAI-compatible API | host: ${MACSTUDIO_IP}:11537 | submodule: apple-on-device-openai"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].object == list"
    alerts:
      - type: ntfy

  - name: tp42 PaddleOCR backend
    group: "macstudio — ML Services"
    url: "http://192.168.1.169:8080/health"
    description: "Native PaddleOCR layout-parsing service on tp42.local | POST /layout-parsing | proxied via paddleocr container on nuc25"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].errorCode == 0"
    alerts:
      - type: ntfy

  - name: MinerU API server
    group: "macstudio — ML Services"
    url: "http://${MACSTUDIO_IP}:8086/health"
    description: "MinerU document parsing API | host: ${MACSTUDIO_IP}:8086 | backend: hybrid-engine (local VLM on MPS) | launchd: com.macaistack.mineru"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: Infinity (Embedding/Rerank)
    group: "macstudio — ML Services"
    url: "http://${MACSTUDIO_IP}:7997/health"
    description: "Infinity embedding/reranking service | host: ${MACSTUDIO_IP}:7997 | external: http://${MACSTUDIO_IP}:7997"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: ntfy

  - name: Unsloth Studio (img2txt VLM)
    group: "macstudio — ML Services"
    url: "http://${MACSTUDIO_IP}:8888/api/inference/status"
    headers:
      Authorization: "Bearer ${UNSLOTH_API_KEY}"
    # Checks the currently-loaded model, not just HTTP reachability: after the 2026-07-11
    # hang incident (server wedged, listening but never responding -- see nuc25.local/CLAUDE.md
    # and macstudio.local/CLAUDE.md), a plain reachability/root check would also have caught
    # a full hang (the whole event loop was stuck, not just inference), but would NOT catch
    # the secondary failure mode hit during recovery: a freshly-restarted server returns 200
    # immediately but has no model loaded (RAGFlow's img2txt calls then fail with
    # "400 No model loaded"). /api/inference/status is lightweight (no real generation, unlike
    # a full /v1/chat/completions call) and reports active_model, so this condition catches both.
    # Tradeoff: this box is also used interactively to load/unload other models (gemma, etc.)
    # throughout the day -- a real "wrong model loaded for RAGFlow" state will legitimately
    # alert here, which is intentional (img2txt WILL fail in that state), not a false positive.
    description: "Unsloth Studio img2txt VLM (Qwen3-VL-30B-A3B-Instruct-MLX-4bit) | host: ${MACSTUDIO_IP}:8888 | consumed by RAGFlow's img2txt_id for image captioning during document parsing | not a managed launchd service -- see macstudio.local/CLAUDE.md for restart/reload procedure"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].active_model == /ext/Modelle/lmstudio-community/Qwen3-VL-30B-A3B-Instruct-MLX-4bit"
    alerts:
      - type: ntfy

  # ── macstudio: System Health ──────────────────────────────────────────────

  - name: macstudio Memory Pressure
    group: "macstudio — System Health"
    url: "http://${MACSTUDIO_IP}:9101/health"
    description: "macOS swap / memory-pressure sentinel | host: ${MACSTUDIO_IP}:9101 | launchd: com.macaistack.memory-health | logs: ~/Library/Logs/macaistack-memory-health.log | three signals, any fires 503/degraded: memorystatus_level < 20, swap > 90% of capacity, or swapout rate > 500 pages/s"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY].status == ok"
    alerts:
      - type: ntfy

  - name: Wyoming Whisper
    group: "macstudio — ML Services"
    url: "tcp://${MACSTUDIO_IP}:10300"
    description: "Wyoming Whisper speech-to-text bridge | host: ${MACSTUDIO_IP}:10300 | launchd: com.macaistack.wyoming | logs: ~/Library/Logs/macaistack-wyoming.log | Wyoming protocol"
    interval: 60s
    conditions:
      - "[CONNECTED] == true"
    alerts:
      - type: ntfy
